steps:
  - name: "node:20"
    dir: "apps/user-web"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        npm install -g pnpm

        echo "VITE_API_URL=${_VITE_API_URL}" > .env.production

        pnpm install
        pnpm build

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    dir: "apps/user-web"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud config set app/cloud_build_timeout 1600
        gcloud app deploy app.yaml --quiet

timeout: "1600s"

options:
  logging: CLOUD_LOGGING_ONLY